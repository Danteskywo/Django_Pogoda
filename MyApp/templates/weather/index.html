<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
</head>
<body>
    <h1>Погода на странице</h1>
    <body>
				<h1>Погода в вашем городе</h1>
				<form action="" method="post">
					{% csrf_token %}
					<label for="city">Город</label>
					{{ form.name }}
					<input type="submit" name="send" value="Узнать" class="mt-2 btn btn-danger">
				</form>
			</div>
				<h1>Информация</h1>
				<!--alert alert-danger подсветить красным-->
				<!--alert alert-info подсветить синим-->

				{% for info in all_info %}
				<div class="alert alert-info">
					<div class="row">
						<div class="col-9">
							<b>Город:</b> {{ info.city }}<br>
							<b>Температура:</b> {{ info.temp }}<sup>o</sup><br>
						</div>
						<div class="col-2 offset-1">
							<img src="https://openweathermap.org/img/w/{{ info.icon }}.png" alt="Фото погоды" class="img-thumbnail">
						</div>
					</div>
				</div>
				{% endfor %}

			</div>
		</div>
	</div>

</body>
</html>
